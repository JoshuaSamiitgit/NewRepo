name: Daily Repository Update

on:
  schedule:
    - cron: '15 2 * * *'  # Runs daily at 02:15 UTC
  workflow_dispatch:      # Allows manual triggering

jobs:
  daily-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Update file - 23f3003626@ds.study.iitm.ac.in
        run: |
          echo "Last updated on $(date -u)" >> daily-log.txt

      - name: Commit changes
        run: |
          git config --global user.name "DevSync Automation Bot"
          git config --global user.email "23f3003626@ds.study.iitm.ac.in"
          git add daily-log.txt
          git commit -m "Automated daily update - $(date -u)" || echo "No changes to commit"
          git push
