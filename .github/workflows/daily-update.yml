name: Daily Repository Update

on:
  schedule:
    - cron: '20 3 * * *'  # Runs daily at 03:20 UTC (specific time)
  workflow_dispatch:

jobs:
  daily-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Update file - 23f3003626@ds.study.iitm.ac.in
        run: |
          echo "Run at $(date -u)" >> daily-log.txt

      - name: Commit and Push
        run: |
          git config user.name "DevSync Automation Bot"
          git config user.email "23f3003626@ds.study.iitm.ac.in"
          git add daily-log.txt
          git commit -m "Automated daily update - $(date -u)"
          git push
